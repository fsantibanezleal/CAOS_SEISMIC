name: Deploy web to GitHub Pages

# Builds the static SPA in app/ (Vite) and publishes it to GitHub Pages on the
# custom domain seismic.fasl-work.com. The site is a pure static viewer — no backend.
# The daily forecast artifact is committed under results/ and read by the SPA.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      # SPA deep-link fallback: Pages serves 404.html for unknown paths; making it
      # a copy of index.html lets client-side routing handle /problem, /monitoring, etc.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
