name: Deploy web to GitHub Pages

# Builds the static SPA in app/ (Vite) and publishes it to GitHub Pages on the
# custom domain seismic.fasl-work.com. The site is a pure static viewer — no backend.
# The daily forecast artifact is committed under results/ and read by the SPA.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "results/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build
      # Overlay the committed production data (git-as-data) onto the built site. The daily job commits
      # the fresh artifacts under results/ (forecast-*.json.gz + index.json); copy them into dist/data so
      # Pages serves the LATEST forecast. Vite already copied app/public/data/* (the dev/sample fallback);
      # this overwrites index.json + adds the real artifacts so the production site is always current.
      - run: |
          mkdir -p dist/data
          cp -f ../results/index.json dist/data/ 2>/dev/null || true
          cp -f ../results/forecast-*.json.gz dist/data/ 2>/dev/null || true
          cp -f ../results/backanalysis-global-*.json dist/data/ 2>/dev/null || true
          # 30-day outlook artifacts (the geodetic-background longer-horizon surface).
          cp -f ../results/outlook-index.json dist/data/ 2>/dev/null || true
          cp -f ../results/outlook-30d-*.json.gz dist/data/ 2>/dev/null || true
          cp -f ../results/outlook-evidence-30d.json dist/data/ 2>/dev/null || true
      # SPA deep-link fallback: Pages serves 404.html for unknown paths; making it
      # a copy of index.html lets client-side routing handle /problem, /monitoring, etc.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
