<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CAOS_SEISMIC — bounded, calibrated conditional probabilistic seismic forecasts (forecasts, never predictions; evaluated CSEP-style)."
    />
    <title>CAOS_SEISMIC — Conditional Seismic Forecasting</title>
    <script>
      // Apply the persisted theme before first paint to avoid a flash of the
      // wrong palette. The React theme store reads the same localStorage key.
      (function () {
        try {
          var saved = localStorage.getItem("caos.seismic.theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = saved || (prefersDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
