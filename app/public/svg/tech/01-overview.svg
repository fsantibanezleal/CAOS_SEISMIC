<svg viewBox="0 0 840 360" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="ah1" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--color-fg-subtle)"/>
    </marker>
  </defs>

  <text x="20" y="30" font-size="16" font-weight="700" fill="var(--color-fg)">CAOS_SEISMIC</text>
  <text x="20" y="50" font-size="12" fill="var(--color-text-muted)">Global conditional probabilistic seismic forecasting &#8212; forecasts, never predictions</text>

  <!-- the design-build lifecycle -->
  <text x="20" y="92" font-size="12" font-weight="600" fill="var(--color-accent)">Design &#183; build lifecycle</text>

  <!-- 6 stages, two rows of 3 -->
  <g>
    <rect x="20"  y="108" width="240" height="64" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
    <text x="36" y="132" font-size="13" font-weight="600" fill="var(--color-fg)">1 &#183; Deep research</text>
    <text x="36" y="152" font-size="11" fill="var(--color-text-muted)">SOTA methods, cited evidence</text>

    <rect x="300" y="108" width="240" height="64" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
    <text x="316" y="132" font-size="13" font-weight="600" fill="var(--color-fg)">2 &#183; Models</text>
    <text x="316" y="152" font-size="11" fill="var(--color-text-muted)" font-family="ui-monospace, monospace">src/caos_seismic/model/</text>

    <rect x="580" y="108" width="240" height="64" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
    <text x="596" y="132" font-size="13" font-weight="600" fill="var(--color-fg)">3 &#183; Validate</text>
    <text x="596" y="152" font-size="11" fill="var(--color-text-muted)">leakage-free CSEP / IGPE</text>

    <rect x="20"  y="220" width="240" height="64" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
    <text x="36" y="244" font-size="13" font-weight="600" fill="var(--color-fg)">4 &#183; Bake artifact</text>
    <text x="36" y="264" font-size="11" fill="var(--color-text-muted)" font-family="ui-monospace, monospace">results/ (compact, gzip)</text>

    <rect x="300" y="220" width="240" height="64" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
    <text x="316" y="244" font-size="13" font-weight="600" fill="var(--color-fg)">5 &#183; SPA replay</text>
    <text x="316" y="264" font-size="11" fill="var(--color-text-muted)" font-family="ui-monospace, monospace">app/ (read-only)</text>

    <rect x="580" y="220" width="240" height="64" rx="8" fill="var(--color-accent-soft, var(--color-surface-2))" stroke="var(--color-accent)"/>
    <text x="596" y="244" font-size="13" font-weight="600" fill="var(--color-accent)">6 &#183; Deploy</text>
    <text x="596" y="264" font-size="11" fill="var(--color-text-muted)">git-as-data &#8594; GitHub Pages</text>
  </g>

  <!-- arrows: 1->2->3 (top row), 3->4 (wrap), 4->5->6 (bottom row) -->
  <line x1="260" y1="140" x2="298" y2="140" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah1)"/>
  <line x1="540" y1="140" x2="578" y2="140" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah1)"/>
  <path d="M700,172 L700,196 L140,196 L140,218" fill="none" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah1)"/>
  <line x1="260" y1="252" x2="298" y2="252" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah1)"/>
  <line x1="540" y1="252" x2="578" y2="252" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah1)"/>

  <text x="20" y="330" font-size="11" fill="var(--color-text-muted)">The pipeline + its honest validation ARE the product; the web app replays a validated, committed subset.</text>
</svg>
