<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" width="880" class="arch-svg" role="img" aria-label="CAOS_SEISMIC lanes: the offline/compute pipeline (daily ETAS + weekly geodetic neural), the git-as-data bridge, and the web replay">
  <style>
    .arch-svg text { font-family: Inter, "Segoe UI", system-ui, sans-serif; }
    .arch-svg .mono { font-family: ui-monospace, Consolas, monospace; }
    .arch-svg .bx { fill: var(--color-surface-2); stroke: var(--color-border); stroke-width: 1.2; }
    .arch-svg .bx-hi { stroke: var(--color-accent); }
    .arch-svg .bx-web { stroke: var(--color-good); }
    .arch-svg .bx-eng { stroke: var(--color-warn); }
    .arch-svg .lane { fill: none; stroke: var(--color-border); stroke-dasharray: 5 4; }
    .arch-svg .ttl { fill: var(--color-text); font-size: 12.5px; font-weight: 600; }
    .arch-svg .lane-ttl { fill: var(--color-accent); font-size: 11.5px; font-weight: 700; letter-spacing: .04em; }
    .arch-svg .sub { fill: var(--color-text-muted); font-size: 10px; }
    .arch-svg .it { fill: var(--color-text); font-size: 10.5px; }
    .arch-svg .cd { fill: var(--color-accent); font-size: 10px; }
    .arch-svg .mu { fill: var(--color-text-muted); font-size: 10px; }
    .arch-svg .good { fill: var(--color-good); font-size: 10.5px; font-weight: 600; }
    .arch-svg .flow { fill: none; stroke: var(--color-fg-subtle); stroke-width: 1.5; }
    .arch-svg .lbl { fill: var(--color-text-muted); font-size: 9.5px; }
  </style>
  <defs>
    <marker id="ln-ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--color-fg-subtle)"/>
    </marker>
  </defs>

  <!-- lane separators -->
  <line class="lane" x1="312" y1="20" x2="312" y2="450"/>
  <line class="lane" x1="566" y1="20" x2="566" y2="450"/>

  <!-- lane headers -->
  <text class="lane-ttl" x="14" y="34">OFFLINE / COMPUTE</text>
  <text class="sub" x="14" y="49">GPU workstation · deterministic · git-ignored heavy data</text>
  <text class="lane-ttl" x="328" y="34">THE BRIDGE</text>
  <text class="sub" x="328" y="49">git-as-data publish</text>
  <text class="lane-ttl" x="582" y="34">WEB (live)</text>
  <text class="sub" x="582" y="49">GitHub Pages · the browser</text>

  <!-- daily job -->
  <rect class="bx bx-eng" x="14" y="64" width="284" height="178" rx="10"/>
  <text class="ttl" x="26" y="86">Daily job · 1–7 day forecast</text>
  <text class="cd mono" x="26" y="101">caos-seismic daily  (03:00)</text>
  <rect class="bx" x="26" y="112" width="260" height="44" rx="6"/>
  <text class="it" x="36" y="129">fetch global catalog</text>
  <text class="cd mono" x="36" y="144">data/fetch.py · ISC / USGS</text>
  <rect class="bx" x="26" y="162" width="260" height="44" rx="6"/>
  <text class="it" x="36" y="179">fit regime-tiled ETAS, infer field</text>
  <text class="cd mono" x="36" y="194">model/tiled.py · inference/daily.py</text>
  <text class="mu" x="26" y="226">→ forecast-&lt;date&gt;.json.gz (sparse, quantized)</text>

  <!-- weekly job -->
  <rect class="bx bx-eng" x="14" y="252" width="284" height="178" rx="10"/>
  <text class="ttl" x="26" y="274">Weekly job · 30-day outlook</text>
  <text class="cd mono" x="26" y="289">caos-seismic outlook  (Sun 04:00)</text>
  <rect class="bx" x="26" y="300" width="260" height="44" rx="6"/>
  <text class="it" x="36" y="317">fit strain-conditioned neural</text>
  <text class="cd mono" x="36" y="332">model/context_tpp.py · GNSS strain</text>
  <rect class="bx" x="26" y="350" width="260" height="44" rx="6"/>
  <text class="it" x="36" y="367">bake 30-day geodetic background</text>
  <text class="cd mono" x="36" y="382">inference/outlook.py</text>
  <text class="mu" x="26" y="414">→ outlook-30d-&lt;date&gt;.json.gz + evidence</text>

  <!-- bridge -->
  <rect class="bx bx-hi" x="326" y="170" width="226" height="150" rx="10"/>
  <text class="ttl" x="338" y="192">git-as-data publish</text>
  <text class="sub" x="338" y="207">scoped, robust to the work branch</text>
  <rect class="bx" x="338" y="218" width="202" height="40" rx="6"/>
  <text class="cd mono" x="348" y="234">_publish_scoped()</text>
  <text class="mu" x="348" y="249">commit-tree onto origin/main</text>
  <rect class="bx" x="338" y="264" width="202" height="44" rx="6"/>
  <text class="it" x="348" y="281">Pages workflow copies</text>
  <text class="cd mono" x="348" y="296">results/* → dist/data</text>

  <!-- web -->
  <rect class="bx bx-web" x="580" y="170" width="286" height="150" rx="10"/>
  <text class="ttl" x="592" y="192">SPA replay — read-only</text>
  <text class="sub" x="592" y="207">Vite + React · zero server</text>
  <rect class="bx" x="592" y="218" width="262" height="40" rx="6"/>
  <text class="it" x="602" y="234">load + decode the committed field</text>
  <text class="cd mono" x="602" y="249">data/client.ts (gzip-aware)</text>
  <rect class="bx" x="592" y="264" width="262" height="40" rx="6"/>
  <text class="it" x="602" y="280">render field</text>
  <text class="cd mono" x="602" y="295">deck.gl + MapLibre</text>
  <text class="good" x="592" y="334">NO live compute · pure replay</text>

  <!-- flows -->
  <path class="flow" d="M298,180 C312,180 318,210 325,224" marker-end="url(#ln-ar)"/>
  <path class="flow" d="M298,360 C312,360 318,290 325,276" marker-end="url(#ln-ar)"/>
  <path class="flow" d="M552,245 L580,245" marker-end="url(#ln-ar)"/>
  <text class="lbl" x="556" y="238">serve</text>

  <text class="mu" x="14" y="462">The heavy science runs offline on the GPU; the browser only animates the committed, sha-auditable artifacts — what proves this is real.</text>
</svg>
