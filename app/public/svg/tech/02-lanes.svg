<svg viewBox="0 0 840 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--color-fg-subtle)"/>
    </marker>
  </defs>

  <text x="20" y="28" font-size="15" font-weight="700" fill="var(--color-fg)">Lanes &#8212; what runs where</text>

  <!-- lane headers -->
  <text x="140" y="64" font-size="12" font-weight="700" fill="var(--color-accent)" text-anchor="middle">OFFLINE / COMPUTE</text>
  <text x="140" y="80" font-size="10" fill="var(--color-text-muted)" text-anchor="middle">GPU workstation</text>
  <text x="420" y="64" font-size="12" font-weight="700" fill="var(--color-accent)" text-anchor="middle">THE BRIDGE</text>
  <text x="420" y="80" font-size="10" fill="var(--color-text-muted)" text-anchor="middle">git-as-data</text>
  <text x="700" y="64" font-size="12" font-weight="700" fill="var(--color-accent)" text-anchor="middle">WEB (live)</text>
  <text x="700" y="80" font-size="10" fill="var(--color-text-muted)" text-anchor="middle">the browser</text>

  <!-- lane separators -->
  <line x1="280" y1="92" x2="280" y2="372" stroke="var(--color-border)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="560" y1="92" x2="560" y2="372" stroke="var(--color-border)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- OFFLINE lane -->
  <rect x="24" y="104" width="232" height="78" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
  <text x="40" y="128" font-size="12" font-weight="600" fill="var(--color-fg)" font-family="ui-monospace, monospace">caos-seismic daily</text>
  <text x="40" y="148" font-size="11" fill="var(--color-text-muted)">fetch ISC/USGS &#8594; tiled ETAS</text>
  <text x="40" y="166" font-size="11" fill="var(--color-text-muted)">&#8594; 1&#8211;7 day forecast field</text>

  <rect x="24" y="198" width="232" height="78" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
  <text x="40" y="222" font-size="12" font-weight="600" fill="var(--color-fg)" font-family="ui-monospace, monospace">caos-seismic outlook</text>
  <text x="40" y="242" font-size="11" fill="var(--color-text-muted)">strain neural fit (weekly)</text>
  <text x="40" y="260" font-size="11" fill="var(--color-text-muted)">&#8594; 30-day geodetic field</text>

  <!-- BRIDGE lane -->
  <rect x="304" y="150" width="232" height="84" rx="8" fill="var(--color-accent-soft, var(--color-surface-2))" stroke="var(--color-accent)"/>
  <text x="320" y="174" font-size="12" font-weight="600" fill="var(--color-accent)">commit results/ &#8594; main</text>
  <text x="320" y="194" font-size="11" fill="var(--color-text-muted)">robust commit-tree publish</text>
  <text x="320" y="212" font-size="11" fill="var(--color-text-muted)">Pages copies fresh artifacts</text>

  <!-- WEB lane -->
  <rect x="584" y="150" width="232" height="84" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
  <text x="600" y="174" font-size="12" font-weight="600" fill="var(--color-fg)">SPA replay</text>
  <text x="600" y="194" font-size="11" fill="var(--color-text-muted)">deck.gl + MapLibre field</text>
  <text x="600" y="212" font-size="11" fill="var(--color-good)">NO live compute &#183; pure replay</text>

  <!-- arrows offline -> bridge -> web -->
  <path d="M256,168 C280,168 286,186 302,190" fill="none" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah2)"/>
  <path d="M256,232 C280,232 286,200 302,196" fill="none" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah2)"/>
  <line x1="536" y1="192" x2="582" y2="192" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah2)"/>

  <text x="20" y="392" font-size="11" fill="var(--color-text-muted)">The heavy science runs offline on the GPU; the browser only animates the committed, audited artifacts.</text>
</svg>
