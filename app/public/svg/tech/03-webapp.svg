<svg viewBox="0 0 840 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="ah3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="var(--color-fg-subtle)"/>
    </marker>
  </defs>

  <text x="20" y="28" font-size="15" font-weight="700" fill="var(--color-fg)">Web-app flow</text>
  <text x="20" y="46" font-size="11" fill="var(--color-text-muted)">Vite + React + TypeScript &#183; static-first, read-only</text>

  <!-- pages -->
  <rect x="24" y="70" width="200" height="118" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
  <text x="40" y="92" font-size="12" font-weight="600" fill="var(--color-fg)">Pages (8 routes)</text>
  <text x="40" y="112" font-size="10.5" fill="var(--color-text-muted)">Intro &#183; Problem &#183; Method</text>
  <text x="40" y="128" font-size="10.5" fill="var(--color-text-muted)">Implementation &#183; Experiments</text>
  <text x="40" y="144" font-size="10.5" fill="var(--color-text-muted)">Back-analysis</text>
  <text x="40" y="160" font-size="10.5" fill="var(--color-accent)">Monitoring (1&#8211;7 d)</text>
  <text x="40" y="176" font-size="10.5" fill="var(--color-accent)">Outlook (30 d)</text>

  <!-- data client -->
  <rect x="300" y="78" width="220" height="64" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
  <text x="316" y="100" font-size="12" font-weight="600" fill="var(--color-fg)" font-family="ui-monospace, monospace">data/client.ts</text>
  <text x="316" y="120" font-size="10.5" fill="var(--color-text-muted)">gzip-aware loader, decodes</text>
  <text x="316" y="134" font-size="10.5" fill="var(--color-text-muted)">quantized log-uint16 rates</text>

  <!-- artifacts -->
  <rect x="300" y="166" width="220" height="58" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
  <text x="316" y="188" font-size="11" fill="var(--color-text-muted)" font-family="ui-monospace, monospace">data/index.json</text>
  <text x="316" y="208" font-size="11" fill="var(--color-text-muted)" font-family="ui-monospace, monospace">forecast-&lt;date&gt;.json.gz</text>

  <!-- render -->
  <rect x="596" y="78" width="220" height="64" rx="8" fill="var(--color-accent-soft, var(--color-surface-2))" stroke="var(--color-accent)"/>
  <text x="612" y="100" font-size="12" font-weight="600" fill="var(--color-accent)">deck.gl + MapLibre</text>
  <text x="612" y="120" font-size="10.5" fill="var(--color-text-muted)">H3 / heatmap field layer,</text>
  <text x="612" y="134" font-size="10.5" fill="var(--color-text-muted)">value-readout on the controls</text>

  <!-- contract gate -->
  <rect x="596" y="166" width="220" height="58" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
  <text x="612" y="188" font-size="11.5" font-weight="600" fill="var(--color-fg)">TS contract type</text>
  <text x="612" y="208" font-size="10.5" fill="var(--color-warn)">schema drift &#8594; build fails</text>

  <!-- deploy strip -->
  <rect x="24" y="250" width="792" height="56" rx="8" fill="var(--color-surface)" stroke="var(--color-border)"/>
  <text x="40" y="274" font-size="12" font-weight="600" fill="var(--color-fg)">Deploy</text>
  <text x="40" y="293" font-size="11" fill="var(--color-text-muted)" font-family="ui-monospace, monospace">npm run build  &#8594;  copy results/* into dist/data  &#8594;  GitHub Pages serves SPA + artifacts (404.html = index.html)</text>

  <!-- arrows -->
  <line x1="224" y1="110" x2="298" y2="110" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah3)"/>
  <line x1="410" y1="142" x2="410" y2="164" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah3)"/>
  <line x1="520" y1="110" x2="594" y2="110" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah3)"/>
  <line x1="706" y1="142" x2="706" y2="164" stroke="var(--color-fg-subtle)" stroke-width="1.5" marker-end="url(#ah3)"/>

  <text x="20" y="332" font-size="11" fill="var(--color-text-muted)">The SPA computes nothing: it loads the committed field and renders it. The TypeScript mirror keeps the UI and the artifact in lockstep.</text>
</svg>
