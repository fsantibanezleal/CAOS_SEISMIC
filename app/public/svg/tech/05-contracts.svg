<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" class="arch-svg" role="img" aria-label="CAOS_SEISMIC data contracts: the ingestion contract, the artifact contract, the country views, and the enforced honest framing">
  <style>
    .arch-svg text { font-family: Inter, "Segoe UI", system-ui, sans-serif; }
    .arch-svg .mono { font-family: ui-monospace, Consolas, monospace; }
    .arch-svg .bx { fill: var(--color-surface-2); stroke: var(--color-border); stroke-width: 1.2; }
    .arch-svg .bx-hi { stroke: var(--color-accent); }
    .arch-svg .bx-web { stroke: var(--color-good); }
    .arch-svg .bx-gate { stroke: var(--color-warn); }
    .arch-svg .ttl { fill: var(--color-text); font-size: 12.5px; font-weight: 600; }
    .arch-svg .sub { fill: var(--color-text-muted); font-size: 10px; }
    .arch-svg .it { fill: var(--color-text); font-size: 10.5px; }
    .arch-svg .cd { fill: var(--color-accent); font-size: 10px; }
    .arch-svg .mu { fill: var(--color-text-muted); font-size: 10px; }
    .arch-svg .warn { fill: var(--color-warn); font-size: 10.5px; font-weight: 600; }
    .arch-svg .flow { fill: none; stroke: var(--color-fg-subtle); stroke-width: 1.5; }
    .arch-svg .lbl { fill: var(--color-text-muted); font-size: 9.5px; }
  </style>
  <defs>
    <marker id="ct-ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--color-fg-subtle)"/>
    </marker>
  </defs>

  <!-- raw -->
  <rect class="bx" x="14" y="44" width="150" height="100" rx="10"/>
  <text class="ttl" x="26" y="66">Raw catalog</text>
  <text class="sub" x="26" y="81">git-ignored, in the vault</text>
  <text class="it" x="26" y="100">ISC reviewed bulletin</text>
  <text class="it" x="26" y="116">USGS ComCat (real-time)</text>
  <text class="mu" x="26" y="134">bring-your-own-data entry</text>

  <!-- contract 1 -->
  <rect class="bx bx-hi" x="196" y="30" width="244" height="128" rx="10"/>
  <text class="ttl" x="208" y="52">Contract 1 · ingestion</text>
  <text class="cd mono" x="208" y="67">data/clean.py (raw → pipeline)</text>
  <text class="it" x="208" y="88">homogenize to Mw</text>
  <text class="mu" x="208" y="103">Scordilis-2006 conversions (TLS)</text>
  <text class="it" x="208" y="123">estimate Mc, b</text>
  <text class="mu" x="208" y="138">Aki–Utsu · space–time completeness</text>
  <text class="warn" x="208" y="154">decluster · explicit outlier policy</text>

  <!-- pipeline -->
  <rect class="bx bx-eng" x="472" y="44" width="150" height="100" rx="10"/>
  <text class="ttl" x="484" y="66">Pipeline</text>
  <text class="sub" x="484" y="81">staged, deterministic</text>
  <text class="it" x="484" y="100">fit → infer → bake</text>
  <text class="cd mono" x="484" y="118">inference/daily.py</text>
  <text class="cd mono" x="484" y="134">inference/outlook.py</text>

  <!-- contract 2 -->
  <rect class="bx bx-hi" x="196" y="186" width="244" height="132" rx="10"/>
  <text class="ttl" x="208" y="208">Contract 2 · artifact</text>
  <text class="cd mono" x="208" y="223">contracts.py (pipeline → web)</text>
  <text class="it" x="208" y="244">sparse, quantized field</text>
  <text class="mu" x="208" y="259">log-uint16 rate codes · H3-indexed</text>
  <text class="it" x="208" y="280">+ index.json pointer</text>
  <text class="mu" x="208" y="295">30-day outlook ships its own field</text>
  <text class="mu" x="208" y="310">+ a multi-region evidence file</text>

  <!-- web -->
  <rect class="bx bx-gate" x="472" y="186" width="150" height="100" rx="10"/>
  <text class="ttl" x="484" y="208">Web (replay)</text>
  <text class="cd mono" x="484" y="223">data/types.ts</text>
  <text class="it" x="484" y="244">TS type mirrors</text>
  <text class="it" x="484" y="260">the artifact</text>
  <text class="warn" x="484" y="280">drift → build fails</text>

  <!-- views -->
  <rect class="bx bx-web" x="654" y="30" width="212" height="288" rx="10"/>
  <text class="ttl" x="666" y="52">Cases = country VIEWS</text>
  <text class="sub" x="666" y="67">into ONE global field</text>
  <text class="cd mono" x="666" y="86">eval/views.py</text>
  <text class="it" x="666" y="110">High seismicity</text>
  <text class="mu" x="666" y="126">Chile · Japan · California · NZ</text>
  <text class="it" x="666" y="150">Low seismicity</text>
  <text class="mu" x="666" y="166">stable interiors (≈ 0 skill)</text>
  <text class="it" x="666" y="190">+ Italy · Greece · Mexico</text>
  <text class="it" x="666" y="206">Peru · Türkiye · Indonesia · …</text>
  <text class="mu" x="666" y="232">a view never re-computes — it</text>
  <text class="mu" x="666" y="247">narrows which cells are shown</text>
  <text class="mu" x="666" y="271">pre-registered seismicity class</text>
  <text class="mu" x="666" y="286">→ the high-vs-low bias is fixed</text>
  <text class="mu" x="666" y="301">before scoring, not post-hoc</text>

  <!-- flows -->
  <path class="flow" d="M164,94 L196,94" marker-end="url(#ct-ar)"/>
  <path class="flow" d="M440,94 L472,94" marker-end="url(#ct-ar)"/>
  <text class="lbl" x="444" y="86">clean Mw</text>
  <path class="flow" d="M547,144 L547,186" marker-end="url(#ct-ar)"/>
  <text class="lbl" x="553" y="170">bake</text>
  <path class="flow" d="M440,236 L472,236" marker-end="url(#ct-ar)"/>
  <text class="lbl" x="444" y="228">serve</text>

  <!-- honest framing -->
  <rect class="bx bx-hi" x="14" y="338" width="852" height="74" rx="10"/>
  <text class="ttl" x="26" y="360">Design discipline — honest framing, enforced everywhere</text>
  <text class="it" x="26" y="382">forecasts not predictions · no alarms · null/negative results recorded · numbers sourced (labeled if synthetic)</text>
  <text class="mu" x="26" y="400">the experiment register E1→E14 (docs/experiments.md + the in-app Experiments page) is the day-by-day audit trail — what proves the work is real</text>

  <text class="mu" x="14" y="438">Bad/incomplete data is handled explicitly at Contract 1, never silently coerced; the artifact is the single source of truth for every number the SPA shows.</text>
</svg>
