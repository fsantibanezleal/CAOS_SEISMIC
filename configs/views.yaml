    bbox: { lat_min: -48.0, lat_max: -34.0, lon_min: 165.0, lon_max: 179.5 }
    m_max: 8.5
    h3_resolution: 5
    seismicity_class: high
    plate_setting: "mixed subduction / transform (Hikurangi + Alpine Fault)"
    attribution:
      - "GeoNet (GNS Science / Toka Tū Ake EQC)"
      - "USGS ComCat / ANSS"

  IT:
    name: { en: "Italy", es: "Italia" }
