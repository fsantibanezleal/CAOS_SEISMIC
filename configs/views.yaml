# CAOS_SEISMIC — country / region VIEWS into the single global field.
#
# A view is NOT a separately-trained model. The model conditions ONE global field (region.global);
# each view here is a lightweight spatial window the static web's country selector slices that field
# down to. Adding a country = adding a bbox + m_max + attribution here; no retraining. Inference
# attaches each view's cell-key index to the global ForecastArtifact (contracts.ViewIndexEntry) so
# the SPA reads only the relevant cells when a user drills into a country.
#
# `default_views` is the set inference materializes when `--views` is not passed on the CLI.
# bbox = lat/lon WGS84; m_max bounds the per-view exceedance integral; attribution is MANDATORY on
# any public surface that surfaces this view. `h3_resolution` (optional) gives a country a finer
# display resolution than the world overview (multi-resolution H3 / LOD).

default_views: [CL, JP, NZ, IT, US-CA, GR, MX, PE, TR, ID, CN, PH, CL-N]

# Pre-registered set the GLOBAL back-analysis scores over (eval.global_backanalysis). Chosen for
# tectonic diversity BEFORE scoring (evaluation-plan §2) and split high/low so the high-vs-low
# bias comparison is a fixed partition, not a post-hoc split. Stable interiors (US-CE, EU-W, AU-E)
# are LOW-seismicity controls that expose a model that only looks good on the loud margins.
default_backanalysis_views: [CL, JP, US-CA, NZ, US-CE, EU-W, AU-E]

# `seismicity_class` (high | low) per view tags the pre-registered partition for the bias check:
#   high = active plate boundary (dense, abundant sequences; dominates any pooled skill number)
#   low  = stable interior / slow-deforming (sparse, intermittent; the over-fit control)

views:
  CL:
    name: { en: "Chile (subduction margin)", es: "Chile (margen de subducción)" }
    bbox: { lat_min: -56.0, lat_max: -17.0, lon_min: -76.0, lon_max: -66.0 }
    m_max: 9.5            # 1960 Valdivia Mw 9.5 (global maximum)
    h3_resolution: 5
    seismicity_class: high
    plate_setting: "subduction (Nazca–South America megathrust)"
    attribution:
      - "Centro Sismológico Nacional (CSN), Universidad de Chile"
      - "USGS ComCat / ANSS"

  CL-N:
    name: { en: "Northern Chile (Iquique–Antofagasta)", es: "Norte de Chile (Iquique–Antofagasta)" }
    bbox: { lat_min: -32.0, lat_max: -17.0, lon_min: -72.0, lon_max: -68.0 }
    m_max: 9.0
    h3_resolution: 6     # higher-quality / higher-seismicity drill-down
    seismicity_class: high
    plate_setting: "subduction (Nazca–South America megathrust)"
    attribution:
      - "Centro Sismológico Nacional (CSN), Universidad de Chile"
      - "USGS ComCat / ANSS"

  JP:
