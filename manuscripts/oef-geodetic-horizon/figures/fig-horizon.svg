<svg xmlns="http://www.w3.org/2000/svg" width="640" height="300" viewBox="0 0 640 300" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .t{fill:#1a202c;font-size:12px;text-anchor:middle;} .ts{fill:#4a5568;font-size:10.5px;text-anchor:middle;}
      .ax{stroke:#4a5568;stroke-width:1.2;fill:none;}
      .trig{fill:#c05621;fill-opacity:.18;stroke:#c05621;stroke-width:1.6;}
      .bg{fill:#2b6cb0;fill-opacity:.16;stroke:#2b6cb0;stroke-width:1.6;}
      .win .t{font-weight:bold;}
      .res{font-size:12px;text-anchor:middle;font-weight:bold;}
    </style>
  </defs>
  <text class="t" x="320" y="24" font-weight="bold" font-size="13">The calibrated neural deploys a time-flat geodetic BACKGROUND, not triggering (total forecast constant across windows; ratio 30/7)</text>

  <!-- LEFT: 7-day horizon -->
  <g transform="translate(0,0)">
    <text class="t" x="160" y="56">1-7 day horizon</text>
    <path class="ax" d="M50,230 L290,230"/><path class="ax" d="M50,230 L50,80"/>
    <!-- ETAS triggering spike dominates the short window integral -->
    <path class="trig" d="M50,230 L50,205 C70,205 90,110 120,110 C150,110 170,190 210,205 C240,214 270,216 290,216 L290,230 Z"/>
    <!-- neural flat background -->
    <path class="bg" d="M50,230 L50,208 L290,208 L290,230 Z"/>
    <text class="ts" x="130" y="100" fill="#c05621">ETAS triggering (sequence)</text>
    <text class="ts" x="235" y="200" fill="#2b6cb0">neural flat background</text>
    <text class="ts" x="170" y="248">integral dominated by triggering</text>
    <text class="res" x="160" y="270" fill="#c05621">neural does NOT beat ETAS</text>
    <text class="ts" x="160" y="286">mean IGPE vs ETAS = -0.053 (4/8 windows)</text>
  </g>

  <!-- RIGHT: 30-day horizon -->
  <g transform="translate(320,0)">
    <text class="t" x="160" y="56">30 day horizon</text>
    <path class="ax" d="M50,230 L300,230"/><path class="ax" d="M50,230 L50,80"/>
    <!-- background dominates the long window integral -->
    <path class="bg" d="M50,230 L50,150 L300,150 L300,230 Z"/>
    <!-- small triggering bump -->
    <path class="trig" d="M50,150 L50,140 C70,140 85,112 105,112 C125,112 138,142 160,148 C210,150 260,150 300,150 L300,150 Z"/>
    <text class="ts" x="200" y="180" fill="#2b6cb0">better geodetic background</text>
    <text class="ts" x="110" y="106" fill="#c05621">triggering (minor share)</text>
    <text class="ts" x="175" y="248">integral dominated by background</text>
    <text class="res" x="160" y="270" fill="#2b6cb0">neural BEATS ETAS (robustly)</text>
    <text class="ts" x="160" y="286">global IGPE +0.115 (9/10, n=2166, CI excl. 0)</text>
  </g>
</svg>
